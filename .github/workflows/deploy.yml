name: Deploy Docs

concurrency:
  group: deploy-docs
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PROD_HOST: 204.168.136.156

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Build VitePress
        run: npx vitepress build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: .vitepress/dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ env.PROD_HOST }} \
            "mkdir -p /var/www/pay/docs"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            root@${{ env.PROD_HOST }}:/var/www/pay/docs/

      - name: Ensure nginx docs location
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ env.PROD_HOST }} '
            CONF="/etc/nginx/sites-available/pay-production.conf"
            if [ -f "$CONF" ] && ! grep -q "/var/www/pay/docs/" "$CONF"; then
              # Insert /docs/ location block before the landing page block
              sed -i "/# Landing page/i\\
              # Docs (VitePress) - redirect bare path to trailing slash\\
              location = /docs {\\
                  return 301 /docs/;\\
              }\\
              \\
              location /docs/ {\\
                  alias /var/www/pay/docs/;\\
                  try_files \\\$uri \\\$uri/ /docs/index.html;\\
              }\\
              \\
              # Docs static assets - aggressive caching (VitePress hashes filenames)\\
              location /docs/assets/ {\\
                  alias /var/www/pay/docs/assets/;\\
                  expires 1y;\\
                  add_header Cache-Control \"public, immutable\";\\
              }\\
              " "$CONF"
              nginx -t && systemctl reload nginx
              echo "--- nginx updated with /docs/ block"
            else
              echo "--- nginx already has /docs/ block (or config not found)"
            fi
          '

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ env.PROD_HOST }} \
            "ls /var/www/pay/docs/index.html && echo '--- docs deploy OK'"

      - name: Smoke test
        run: |
          sleep 3
          echo "Checking docs page loads..."
          curl -sf https://pay-skill.com/docs/ | grep -q '<title>' || { echo "FAIL: docs page not loading"; exit 1; }
          echo "--- smoke test passed"

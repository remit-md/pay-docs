name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Build VitePress (validates internal links)
        run: npx vitepress build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python example syntax check
        run: |
          for f in examples/python/*.py; do
            echo "Checking $f..."
            python -m py_compile "$f"
          done
          echo "All Python examples pass syntax check"
